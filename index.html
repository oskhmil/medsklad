  :root {

  body {

  .big-btn {

    color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer; margin-bottom: 14px; width: 100%;

  }
  .or-divider {
    text-align: center; color: var(--muted); font-size: 12px;
    margin: 10px 0; position: relative;
  }
  .or-divider::before, .or-divider::after {
    content: ""; position: absolute; top: 50%;

  }
  .or-divider::before { left: 0; }
  .or-divider::after { right: 0; }
  .upload-zone {
    border: 2px dashed var(--border); border-radius: 14px;
    padding: 20px; text-align: center; cursor: pointer;
    background: var(--card); transition: all .2s; font-size: 13px; color: var(--muted);
  }
  .upload-zone.over { border-color: var(--accent); background: rgba(79,142,247,.05); }

  #loader {
    display: none; text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .loader-ico { font-size: 44px; margin-bottom: 14px; }

  /* home */
  #home-screen { display: none; }
  .stats-bar { display: flex; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    flex: 1; background: var(--card); border: 1px solid var(--border);

  .stat-num { font-size: 22px; font-weight: 800; color: var(--accent); }
  .stat-num.cyan { color: #38bdf8; }

  .stat-num.warn { color: var(--warn); }
  .stat-num.green { color: var(--green); }
  .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; line-height: 1.3; }
  .section-lbl {

    color: var(--muted); text-transform: uppercase; margin-bottom: 8px;

  .chip-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .chip {
    background: var(--card2); border: 1px solid var(--border);

    display: flex; align-items: center; gap: 5px;
  }
  .chip-name { font-weight: 600; }
  .chip-cnt { color: var(--muted); font-size: 11px; }
  .hint-box {
    padding: 14px 16px; background: var(--card);
    border-radius: 12px; border: 1px solid var(--border);
    font-size: 13px; color: var(--muted);
  }
  .last-updated {
    text-align: center; font-size: 11px; color: var(--muted);

  }

  .filter-btn.active {
    border-color: var(--accent); background: rgba(79,142,247,.15); color: var(--accent);
  }
  .result-card {

  .card-head {

  }
